name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        ocaml-compiler: ['5.2', '5.3']
        include:
          - os: ubuntu-latest
            ocaml-compiler: '5.4'

    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml ${{ matrix.ocaml-compiler }}
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}

      - name: Install dependencies
        run: opam install . --deps-only --with-test

      - name: Build
        run: opam exec -- dune build

      - name: Run tests
        run: opam exec -- dune runtest
        env:
          # Avoid io_uring ENOMEM on GitHub Actions ubuntu runners (low memlock limit).
          # Forces Eio to use the poll backend instead.
          EIO_BACKEND: poll

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5.4'

      - name: Install dependencies
        run: opam install . --deps-only

      - name: Check opam files are up to date
        run: opam exec -- dune build @install && git diff --exit-code *.opam
